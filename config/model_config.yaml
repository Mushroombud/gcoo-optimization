spatial:
  battery_threshold: 20
  capacity_multiplier: 1.25
  min_capacity_if_demand_positive: 3

demand:
  min_distance_km: 0.5
  max_distance_km: 3.0
  min_duration_min: 3
  max_duration_min: 20
  min_speed_kmph: 5
  max_speed_kmph: 25
  u0_avg_rides_per_scooter_day: 4

revenue:
  unlock_fee: 600
  per_minute_fee: 180
  avg_scooter_speed_kmph: 12

cost:
  variable_cost_per_ride: 300
  base_fixed_cost_per_scooter_day: 2500
  mu_imbalance_cost: 0.5
  rebalancing_cost_per_scooter_km: 900
  rebalancing_fallback_distance_km: 2.0
  rebalancing_candidate_pool_size: 80

nonlinear_model:
  lambda_market_validation: 0.3
  theta_competition_pressure: 1.0
  U_max_rides_per_scooter_day: 6
  beta_default_if_uncalibrated: 0.08

simulation:
  n_iterations: 1000
  random_seed: 42

sensitivity:
  u0_values: [3, 4, 5, 6]
  lambda_values: [0.0, 0.2, 0.3, 0.5]
  theta_values: [0.5, 1.0, 1.5, 2.0]
  U_values: [4, 6, 8]
  speed_values: [10, 12, 15]
  mu_values: [0.0, 0.5, 1.0]
  rebalancing_cost_values: [0, 600, 900, 1200, 1800]

data_input:
  paths:
    raw_api_dir: data/raw/api
    manifest_jsonl: data/raw/snapshot_manifest.jsonl
    seoul_bike_stations_csv: data/raw/seoul_bike_stations.csv
    seoul_bike_trips_pattern: data/raw/seoul_bike_trips_{operating_day}.csv
    tago_pm_snapshot_pattern: data/raw/tago_pm_snapshots_{label}.csv
    private_pm_operator_summary_csv: data/raw/seoul_private_pm_operator_summary.csv
    seoul_pm_tow_events_csv: data/raw/seoul_pm_tow_events.csv
    seoul_kickboard_parking_zones_csv: data/raw/seoul_kickboard_parking_zones.csv
  apis:
    seoul_bike:
      rows_per_page: 1000
      max_pages: 10
    seoul_openapi:
      rows_per_page: 1000
      retry_attempts: 3
      retry_sleep_seconds: 1.0
      kickboard_tow_service: tbAutoKickboard
      kickboard_parking_service: parkingKickboard
      bike_trip_history_service: tbCycleRentData
      bike_trip_history_default_operating_day: "2025-10-01"
      bike_trip_history_hours: [8, 9, 18, 19]
      max_trip_pages_per_hour: 3
    tago_pm:
      base_url: https://apis.data.go.kr/1613000/PersonalMobilityInfo
      provider_operation: GetPMProvider
      list_operation: GetPMListByProvider
      target_city_name: 서울
      provider_lookup_city_name: ""
      response_type: json
      rows_per_page: 1000
      max_provider_pages: 20
      max_list_pages: 50
      provider_name: ""

model:
  inputs:
    seoul_admin_dong_geojson: data/raw/seoul_admin_dong.geojson
    seoul_bike_stations_csv: data/raw/seoul_bike_stations.csv
    seoul_bike_trips_glob: data/raw/seoul_bike_trips_*.csv
    tago_pm_snapshots_glob: data/raw/tago_pm_snapshots_*.csv
    private_pm_operator_summary_csv: data/raw/seoul_private_pm_operator_summary.csv
    seoul_pm_tow_events_csv: data/raw/seoul_pm_tow_events.csv
    seoul_kickboard_parking_zones_csv: data/raw/seoul_kickboard_parking_zones.csv
  surrogate_pm:
    enabled_when_tago_missing: true
    fallback_gcoo_total_supply: 500
    fallback_competitor_total_supply: 5000
    demand_weight: 1.0
    tow_weight: 2.0
    parking_weight: 0.5
